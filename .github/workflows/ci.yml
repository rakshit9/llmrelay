name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  proxy:
    name: Go proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Vet
        working-directory: proxy
        run: go vet ./...

      - name: Test
        working-directory: proxy
        run: go test ./...

  infra:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --wait

      - name: Health check
        env:
          GATEWAY_API_KEY: test-key
          OPENAI_API_KEY: test-key
        run: |
          go build -o /tmp/proxy ./proxy/cmd/proxy
          /tmp/proxy &
          sleep 2
          curl -sf http://localhost:8080/health

      - name: Teardown
        if: always()
        run: docker compose down
